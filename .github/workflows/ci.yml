name: Shipping CI Pipeline
run-name: Shipping CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - run: echo "mvn checkstyle:check"

  test:
    needs: lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: mvn -B test

  integration-test:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      # `mvn verify` runs the Failsafe *IT tests (Testcontainers) and also re-runs the
      # Surefire unit tests, which is fine.
      - run: mvn -B verify

  sast:
    needs: lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: make coverage sonar-scan

  ci:
    needs: [integration-test, sast, test]
    uses: raghudevopsb89/github-actions/.github/workflows/ci.yml@main
    with:
      component_name: shipping
