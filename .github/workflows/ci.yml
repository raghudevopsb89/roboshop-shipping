name: Shipping CI Pipeline
run-name: Shipping CI Pipeline
on: [push, workflow_dispatch]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - run: echo "mvn checkstyle:check"

  build:
    needs: lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
      - run: |
          make docker-build

  test:
    needs: build
    runs-on: self-hosted
    steps:
      - run: echo "Test Cases"

  publish:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
      - run: make docker-push

